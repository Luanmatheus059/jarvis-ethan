name: Build JARVIS Android APK

on:
  push:
    branches:
      - claude/android-jarvis-assistant-ceKm4
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle 8.7
        run: |
          curl -sSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          sudo unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Generate Gradle Wrapper jar (idempotent)
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Wrapper jar missing — regenerating with installed gradle"
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Show APK info
        working-directory: android
        run: ls -lh app/build/outputs/apk/debug/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish APK as GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.run_number }}
          name: JARVIS Android build #${{ github.run_number }}
          body: |
            APK gerado automaticamente pelo commit ${{ github.sha }}.

            **Como instalar:**
            1. Baixe `app-debug.apk` abaixo direto do celular.
            2. Toque no APK.
            3. Quando o sistema avisar, autorize "Instalar de fontes desconhecidas".
            4. Abra o app e siga o wizard inicial (permissões + download do modelo).
          files: android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
